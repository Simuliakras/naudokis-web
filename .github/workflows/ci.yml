name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      association_base_url:
        description: "Deployed origin to verify (for example https://www.naudokis.lt)"
        required: false
        type: string

# Resolve backend data from dev (not prod) for both the build SSG/ISR fetches and
# the e2e `next dev` webServer, so CI never couples PRs to prod availability/data.
env:
  NEXT_PUBLIC_API_BASE_URL: https://api-dev.naudokis.lt

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn type-check
      - run: yarn test:unit
      # Structure only (no secrets): every path the app claims in the AASA must
      # still resolve to a real page. A claimed-but-unrouted path 404s only for
      # people WITHOUT the app installed — i.e. nobody who would notice in testing.
      - run: yarn verify:app-links:static
      - run: yarn build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(yarn --silent playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: yarn playwright install --with-deps chromium
      - run: yarn test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  association-release:
    if: github.event_name == 'workflow_dispatch' && inputs.association_base_url != ''
    runs-on: ubuntu-latest
    env:
      APPLE_APP_ID: ${{ vars.APPLE_APP_ID }}
      ANDROID_APP_LINK_PACKAGE_NAME: ${{ vars.ANDROID_APP_LINK_PACKAGE_NAME }}
      ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS: ${{ secrets.ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS }}
      NEXT_PUBLIC_ONELINK_URL: ${{ vars.NEXT_PUBLIC_ONELINK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Verify live iOS and Android association files
        run: yarn verify:app-links "${{ inputs.association_base_url }}"
