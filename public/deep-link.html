<!DOCTYPE html>
<!--
  App-not-installed fallback for the universal-link / deep-link paths (served via
  next.config.ts rewrites). Static file — it cannot import from the app, so the
  store URLs and home link below are duplicated from app/lib/contact.ts
  (APP_STORE_URL, PLAY_STORE_URL, SITE_URL); keep them in sync if those change.
  Lithuanian-only by design: the rewritten paths (/listing/* etc.) are never
  locale-prefixed, so there is no reliable EN signal here. noindex.
-->
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Naudokis – Atidaryk programėlėje</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #282C2D;
      color: #ededed;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
      border-radius: 20px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 1.125rem;
      opacity: 0.7;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .store-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: #807ffe;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      padding: 0.875rem 2rem;
      border-radius: 14px;
      width: 100%;
      max-width: 300px;
      transition: opacity 0.2s;
    }

    .store-btn:hover { opacity: 0.85; }

    .store-btn svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .home-link {
      color: #f9f367;
      text-decoration: none;
      font-weight: 400;
      font-size: 0.875rem;
      transition: opacity 0.2s;
    }

    .home-link:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/naudokis/apple-touch-icon.png" alt="Naudokis" class="logo">

    <h1>Atidaryk Naudokis programėlėje</h1>
    <p class="subtitle">Šis puslapis pasiekiamas tik per Naudokis programėlę. Atsisiųsk ją nemokamai.</p>

    <div class="store-buttons">
      <a href="https://apps.apple.com/lt/app/naudokis/id6753683957" class="store-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        <span>App Store</span>
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.naudokis.naudokis" class="store-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.61 1.814L13.793 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .61-.92zm.503-.386l11.27 6.386-2.584 2.584L4.113 1.428zM16.4 15.6l-2.584 2.584L4.113 22.572l8.696-8.97L16.4 15.6zm3.117-5.025l-2.19 1.238L14.6 12l2.728 2.188 2.19 1.237a1.003 1.003 0 0 0 0-1.75l-.001-.001z"/></svg>
        <span>Google Play</span>
      </a>
    </div>

    <a href="https://www.naudokis.lt" class="home-link">Grįžti į naudokis.lt</a>
  </div>
</body>
</html>
