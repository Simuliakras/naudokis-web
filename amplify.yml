# AWS Amplify Hosting build settings.
#
# This file is the source of truth: when amplify.yml exists at the repo root,
# Amplify uses it and IGNORES the build settings saved in the console, so the
# buildspec is reviewable and versioned rather than invisible console state.
#
# The app is deployed as an SSR/compute app (platform WEB_COMPUTE), not the static
# export the previous site used — hence `baseDirectory: .next` rather than `out`.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Next 16 requires Node >=20.9. Pin it rather than inheriting whatever the
        # build image defaults to; Amplify supports Node 20/22/24.
        - nvm install 22
        - nvm use 22
        - node -v
        - yarn install --frozen-lockfile
        # ------------------------------------------------------------------
        # Amplify does NOT pass environment variables into the SSR compute
        # runtime. Verified 2026-07-22 at BOTH app level and branch level: a
        # force-dynamic route reading process.env at request time gets nothing,
        # while the same route serves correctly on any other host. Build-time
        # NEXT_PUBLIC_* inlining is unaffected and needs nothing here.
        #
        # So every variable read at REQUEST time has to be materialised into a
        # .env file that ships with the build, for the Next server to load on
        # boot. Do not delete this block: without it these are silently empty,
        # and two of them fail quietly rather than loudly — TRUSTED_PROXY_HOPS
        # disables per-client rate limiting, and HANDOFF_SIGNING_SECRET stops
        # handoff tokens minting, neither of which surfaces as an error.
        #
        # Consequence to accept: these values live in the build artifact, so
        # rotating one is a rebuild, not an env-var edit. (.env* is gitignored,
        # so this generated file is never committed.)
        # ------------------------------------------------------------------
        - |
          cat > .env.production <<EOF
          ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS=$ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS
          ANDROID_APP_LINK_PACKAGE_NAME=$ANDROID_APP_LINK_PACKAGE_NAME
          TRUSTED_PROXY_HOPS=$TRUSTED_PROXY_HOPS
          HANDOFF_SIGNING_SECRET=$HANDOFF_SIGNING_SECRET
          PLAUSIBLE_EVENTS_API=$PLAUSIBLE_EVENTS_API
          EOF
        # Log which runtime vars actually arrived. Prints the KEY and whether it is
        # set — never the value, since HANDOFF_SIGNING_SECRET is among them and
        # build logs are not a secret store.
        - |
          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue
            if [ -n "$value" ]; then echo "runtime env $key: set"; else echo "runtime env $key: MISSING"; fi
          done < .env.production
    build:
      commands:
        - yarn build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

# ----------------------------------------------------------------------------
# Response headers for assets Amplify serves off its own CDN tier rather than
# through the Next server.
#
# This block is NOT a duplicate of next.config.ts `headers()`. That function only
# runs for responses the Next server produces; everything under public/ is served
# straight from Amplify's static tier and never reaches it. (Same lesson as the
# apple-app-site-association Content-Type — see the note above `headers()` in
# next.config.ts.) Without this block Amplify applies its compute-app default of
# `max-age=5, stale-while-revalidate`, which is short enough that CloudFront
# cannot hold the object either: every brand asset was a `Miss from cloudfront`
# on every page view, ~133 KiB re-fetched from origin each time.
#
# _next/static/** needs nothing here — Next already content-hashes those and
# sends immutable itself.
# ----------------------------------------------------------------------------
customHeaders:
  # Brand imagery, PWA icons and the install QR. `immutable` means CACHE-BUSTING
  # IS A RENAME: editing a file in place will not reach a browser that already
  # holds it for up to a year. The generators that write here
  # (scripts/generate-install-qr.mjs, scripts/generate-favicon.mjs) say the same.
  - pattern: '/naudokis/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  # Deliberately not immutable: /favicon.ico is a fixed, un-hashable path that
  # every crawler requests by convention, so it has no rename escape hatch. A
  # week is long enough to matter and short enough to self-heal.
  - pattern: '/favicon.ico'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=604800'
